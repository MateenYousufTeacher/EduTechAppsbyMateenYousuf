<!DOCTYPE html>
<html>
<head>
  <title>FLN Learning Studio</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      margin: 0;
      padding: 0;
    }

    header {
      background: #0a1628;
      color: white;
      padding: 20px;
      text-align: center;
    }

    h1 {
      margin: 0;
    }

    .container {
      padding: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      text-align: center;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 6px 18px rgba(0,0,0,0.2);
    }

    .card a {
      text-decoration: none;
      color: #0a1628;
      font-weight: bold;
      font-size: 16px;
    }

    .icon {
      font-size: 30px;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

<header>
  <h1>📚 FLN Learning Studio</h1>
  <p>Foundational Literacy & Numeracy Tools</p>
</header>

<div class="container">

  <div class="grid">

    <div class="card">
      <div class="icon">📊</div>
      <a href="Comprehensive FLN Diagnostic & Intervention Suite/">FLN Suite</a>
    </div>

    <div class="card">
      <div class="icon">🔗</div>
      <a href="FGL-Bridge PWA/">FGL Bridge</a>
    </div>

    <div class="card">
      <div class="icon">📈</div>
      <a href="FLN Diagnostic Intelligence Portal/">Intelligence Portal</a>
    </div>

    <div class="card">
      <div class="icon">📚</div>
      <a href="FLN Diagnostic Intelligence Portal 1/">Portal 2</a>
    </div>

    <div class="card">
      <div class="icon">📖</div>
      <a href="FLN Reading & Competency Mastery Lab/">Reading Lab</a>
    </div>

    <div class="card">
      <div class="icon">⚡</div>
      <a href="FLN Recovery & Competency Acceleration Studio/">Recovery</a>
    </div>

    <div class="card">
      <div class="icon">✍️</div>
      <a href="Foundational Literacy Booster/">Literacy Booster</a>
    </div>

    <div class="card">
      <div class="icon">🔢</div>
      <a href="Foundational Literacy and Numeracy Booster/">FLN Booster</a>
    </div>

    <div class="card">
      <div class="icon">➗</div>
      <a href="Foundational Math Trainer/">Math Trainer</a>
    </div>

    <div class="card">
      <div class="icon">🧠</div>
      <a href="Foundational Numeracy Mastery Lab/">Numeracy Lab</a>
    </div>

    <div class="card">
      <div class="icon">🏫</div>
      <a href="NIPUN/">NIPUN Module</a>
    </div>

  </div>

</div>

</body>
</html>
